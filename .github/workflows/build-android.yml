name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'App.js'
      - 'metro.config.js'
      - 'package.json'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      PROJECT_DOMAIN: https://zhiban-production.up.railway.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;25.1.8937393"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup local.properties
        run: echo "sdk.dir=${ANDROID_HOME}" > android/local.properties

      - name: Validate Metro bundler
        run: |
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file App.js \
            --bundle-output /tmp/test-bundle.jsbundle \
            --assets-dest /tmp/test-assets \
            --config metro.config.js
          echo "Bundle size: $(wc -c < /tmp/test-bundle.jsbundle) bytes"
          # Verify PROJECT_DOMAIN is injected correctly
          if grep -q "zhiban-production.up.railway.app" /tmp/test-bundle.jsbundle; then
            echo "✅ PROJECT_DOMAIN (Railway) correctly injected into bundle"
          else
            echo "❌ WARNING: PROJECT_DOMAIN not found in bundle! APK may not connect to backend."
            grep -oP "https?://[^\"\\s)]+" /tmp/test-bundle.jsbundle | sort -u | head -5
          fi

      - name: Patch React Native Gradle Plugin (remove sonatype snapshots)
        run: |
          # The RN gradle plugin hardcodes oss.sonatype.org/snapshots which returns 504
          PLUGIN_DIR=$(find node_modules -path "*@react-native/gradle-plugin*/DependencyUtils.kt" | head -1)
          if [ -n "$PLUGIN_DIR" ]; then
            echo "Patching: $PLUGIN_DIR"
            sed -i '/mavenRepoFromUrl.*oss.sonatype.org.*snapshots/d' "$PLUGIN_DIR"
            grep -n "sonatype" "$PLUGIN_DIR" || echo "Sonatype snapshots line removed successfully"
          else
            echo "WARNING: DependencyUtils.kt not found, skipping patch"
          fi

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --warning-mode all 2>&1 | tee ../gradle-build-log.txt

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: zhiban-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log
          path: gradle-build-log.txt
          retention-days: 7
